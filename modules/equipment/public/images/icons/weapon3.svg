  <line x1="30" y1="53" x2="34" y2="53" stroke="#2a1a0a" stroke-width="1"/>
  
  <!-- 锤柄末端 -->
  <circle cx="32" cy="62" r="3" fill="#6b5344" stroke="#4a3a2a" stroke-width="0.5"/>
  
  <!-- 装饰宝石 -->
