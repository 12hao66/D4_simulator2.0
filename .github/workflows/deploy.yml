name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 1. 全局彻底清空旧dist，保证全新输出
      - name: Clean global dist folder
        run: |
          rm -rf dist
          mkdir -p dist

      # 2. 循环构建，每个模块先清自己的dist再build
      - name: Build all modules (clean before build)
        run: |
          set -e
          modules=(
            calculator
            database
            equipment
            skills
            paragon
            paragonnew
            build
            bbs
          )
          for mod in "${modules[@]}"; do
            echo "===== Building module: $mod ====="
            cd "modules/$mod"
            # 先删除模块旧构建产物
            rm -rf dist
            npm ci
            npm run build
            cd ../..
          done

      # 3. 复制全新构建产物到空dist
      - name: Copy built modules to dist
        run: |
          modules=(
            calculator
            database
            equipment
            skills
            paragon
            paragonnew
            build
            bbs
          )
          for mod in "${modules[@]}"; do
            src="modules/$mod/dist"
            dst="dist/$mod"
            if [ -d "$src" ]; then
              cp -r "$src" "$dst"
              echo "Copied $src -> $dst"
            else
              echo "ERROR: $src not found, build failed for $mod"
              exit 1
            fi
          done
          # 静态目录与首页
          cp -r modules/simulator dist/simulator
          cp index.html dist/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static files to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
