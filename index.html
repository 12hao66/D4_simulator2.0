<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暗黑4模拟器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #c9a962;
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* 主容器 */
    .main-container {
      display: flex;
      height: 100vh;
      width: 100vw;
      background: 
        radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%),
        radial-gradient(ellipse at bottom, #16213e 0%, transparent 50%),
        linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
    }
    
    /* 暗黑风格装饰边框 */
    .diablo-border {
      position: relative;
      border: 2px solid transparent;
      background: 
        linear-gradient(#0a0a0f, #0a0a0f) padding-box,
        linear-gradient(135deg, #8b4513 0%, #c9a962 50%, #8b4513 100%) border-box;
    }
    
    /* 左侧菜单栏 */
    .sidebar {
      width: 260px;
      background: rgba(10, 10, 15, 0.95);
      border-right: 1px solid #2a1a0a;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      position: relative;
      z-index: 10;
      box-shadow: 5px 0 20px rgba(0, 0, 0, 0.5);
    }
    
    .sidebar.collapsed {
      width: 70px;
    }
    
    /* 菜单头部 */
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #2a1a0a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(139, 69, 19, 0.1) 0%, transparent 100%);
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      color: #c9a962;
      text-shadow: 0 0 10px rgba(201, 169, 98, 0.5);
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.3s ease;
      letter-spacing: 2px;
    }
    
    .sidebar.collapsed .logo {
      opacity: 0;
      width: 0;
    }
    
    /* 收起按钮 */
    .collapse-btn {
      background: rgba(139, 69, 19, 0.2);
      border: 1px solid #8b4513;
      color: #c9a962;
      width: 28px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    
    .collapse-btn:hover {
      background: rgba(139, 69, 19, 0.4);
      box-shadow: 0 0 10px rgba(201, 169, 98, 0.3);
    }
    
    /* 菜单项列表 */
    .menu-items {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      position: relative;
      margin: 2px 0;
    }
    
    .menu-item:hover {
      background: rgba(139, 69, 19, 0.15);
      border-left-color: #8b4513;
    }
    
    .menu-item.active {
      background: linear-gradient(90deg, rgba(139, 69, 19, 0.25) 0%, transparent 100%);
      border-left-color: #c9a962;
    }
    
    .menu-icon {
      font-size: 20px;
      min-width: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }
    
    .menu-content {
      flex: 1;
      transition: opacity 0.3s ease;
    }
    
    .sidebar.collapsed .menu-content {
      opacity: 0;
      width: 0;
      overflow: hidden;
    }
    
    .menu-title {
      font-size: 14px;
      font-weight: 500;
      color: #d4c4a8;
      letter-spacing: 0.5px;
    }
    
    .menu-version {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      display: inline-block;
      font-weight: 600;
    }
    
    .menu-version.v3 {
      background: rgba(201, 169, 98, 0.15);
      color: #c9a962;
      border: 1px solid rgba(201, 169, 98, 0.3);
    }
    
    .menu-version.v2 {
      background: rgba(100, 149, 237, 0.15);
      color: #6495ed;
      border: 1px solid rgba(100, 149, 237, 0.3);
    }
    
    /* 我的方案区域 */
    .my-schemes {
      padding: 12px 15px;
      border-top: 1px solid #2a1a0a;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .sidebar.collapsed .my-schemes {
      display: none;
    }
    
    .schemes-title {
      font-size: 12px;
      color: #8b7355;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 1px;
    }
    
    .scheme-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(139, 69, 19, 0.1);
      border: 1px solid rgba(139, 69, 19, 0.2);
      border-radius: 2px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .scheme-item:hover {
      background: rgba(139, 69, 19, 0.2);
      border-color: rgba(201, 169, 98, 0.4);
    }
    
    .scheme-name {
      font-size: 12px;
      color: #d4c4a8;
    }
    
    .scheme-class {
      font-size: 10px;
      color: #c9a962;
      font-weight: 600;
    }
    
    /* 右侧内容区域 */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    
    /* 主内容显示区 */
    .main-display {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    
    /* 功能iframe容器 */
    .function-container {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0a0f;
    }
    
    /* 欢迎页面 */
    .welcome-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: 
        radial-gradient(ellipse at center, rgba(139, 69, 19, 0.1) 0%, transparent 70%);
    }
    
    .welcome-title {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 700;
      color: #c9a962;
      text-shadow: 0 0 30px rgba(201, 169, 98, 0.6);
      margin-bottom: 15px;
      letter-spacing: 3px;
    }
    
    .welcome-subtitle {
      font-size: 16px;
      color: #8b7355;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    
    .welcome-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }
    
    .welcome-card {
      background: rgba(10, 10, 15, 0.8);
      border: 1px solid #2a1a0a;
      border-radius: 4px;
      padding: 25px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .welcome-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a962, transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .welcome-card:hover {
      background: rgba(139, 69, 19, 0.15);
      border-color: rgba(201, 169, 98, 0.4);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    .welcome-card:hover::before {
      opacity: 1;
    }
    
    .welcome-icon {
      font-size: 36px;
      margin-bottom: 15px;
      opacity: 0.9;
    }
    
    .welcome-title {
      font-size: 14px;
      font-weight: 600;
      color: #d4c4a8;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    
    .welcome-desc {
      font-size: 11px;
      color: #8b7355;
      line-height: 1.4;
    }
    
    /* 加载动画 */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b7355;
      font-size: 14px;
    }
    
    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    
    /* 滚动条样式 */
    .menu-items::-webkit-scrollbar {
      width: 4px;
    }
    
    .menu-items::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }
    
    .menu-items::-webkit-scrollbar-thumb {
      background: rgba(139, 69, 19, 0.5);
      border-radius: 2px;
    }
    
    .menu-items::-webkit-scrollbar-thumb:hover {
      background: rgba(201, 169, 98, 0.6);
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        height: 100%;
        transform: translateX(-100%);
      }
      
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      
      .sidebar.collapsed {
        width: 260px;
      }
      
      .welcome-grid {
        grid-template-columns: 1fr;
      }
      
      .welcome-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- 左侧菜单栏 -->
    <div class="sidebar diablo-border" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">⚔️ 暗黑4模拟器</div>
        <button class="collapse-btn" onclick="toggleSidebar()">◀</button>
      </div>
      
      <div class="menu-items">
        <div class="menu-item active" data-module="welcome" onclick="selectModule('welcome')">
          <div class="menu-icon">🏠</div>
          <div class="menu-content">
            <div class="menu-title">首页</div>
          </div>
        </div>
       <div class="menu-item" data-module="build" onclick="selectModule('build')">
          <div class="menu-icon">⚔️</div>
          <div class="menu-content">
            <div class="menu-title">构筑浏览器 <span class="menu-version v3">新</span></div>
          </div>
        </div>
        <div class="menu-item" data-module="bbs" onclick="selectModule('bbs')">
          <div class="menu-icon">💬</div>
          <div class="menu-content">
            <div class="menu-title">社区论坛 <span class="menu-version v3">新</span></div>
          </div>
        </div>
        <div class="menu-item" data-module="equipment" onclick="selectModule('equipment')">
          <div class="menu-icon">🛡️</div>
          <div class="menu-content">
            <div class="menu-title">装备模拟器</div>
          </div>
        </div>
        <div class="menu-item" data-module="calculator" onclick="selectModule('calculator')">
          <div class="menu-icon">📐</div>
          <div class="menu-content">
            <div class="menu-title">伤害计算器 <span class="menu-version v3">v3.0</span></div>
          </div>
        </div>
        
        <div class="menu-item" data-module="simulator" onclick="selectModule('simulator')">
          <div class="menu-icon">🧮</div>
          <div class="menu-content">
            <div class="menu-title">伤害计算器 <span class="menu-version v2">v2.0</span></div>
          </div>
        </div>
        

        
        <div class="menu-item" data-module="skills" onclick="selectModule('skills')">
          <div class="menu-icon">⚡</div>
          <div class="menu-content">
            <div class="menu-title">技能模拟器 <span class="menu-version v3">v2.0</span></div>
          </div>
        </div>
        
        <div class="menu-item" data-module="paragon" onclick="selectModule('paragon')">
          <div class="menu-icon">⭐</div>
          <div class="menu-content">
            <div class="menu-title">巅峰盘模拟器 <span class="menu-version v3">v2.0</span></div>
          </div>
        </div>
        
        <div class="menu-item" data-module="database" onclick="selectModule('database')">
          <div class="menu-icon">📊</div>
          <div class="menu-content">
            <div class="menu-title">数据库</div>
          </div>
        </div>
        
        <div class="menu-item" data-module="dataMaintenance" onclick="selectModule('dataMaintenance')">
          <div class="menu-icon">⚙️</div>
          <div class="menu-content">
            <div class="menu-title">数据维护</div>
          </div>
        </div>
      </div>
      
      <div class="my-schemes">
        <div class="schemes-title">📋 我的方案</div>
        <div class="scheme-item" onclick="selectModule('calculator')">
          <span class="scheme-name">野蛮人旋风斩</span>
          <span class="scheme-class">BARBARIAN</span>
        </div>
        <div class="scheme-item" onclick="selectModule('calculator')">
          <span class="scheme-name">死灵法师骨矛</span>
          <span class="scheme-class">NECROMANCER</span>
        </div>
      </div>
    </div>
    <!-- 右侧内容区域 -->
    <div class="content-area">
      <div class="main-display" id="mainDisplay">
        <!-- 动态内容将在这里显示 -->
      </div>
    </div>
  </div>

  <script>
    // 路径映射
    const paths = {
      welcome: '',
      calculator: 'calculator/',
      simulator: 'simulator/',
      equipment: 'equipment/',
      build: 'build/',
      bbs: 'bbs/',
      skills: 'skills/',
      paragon: 'paragon/',
      database: 'database/',
      dataMaintenance: 'database/index.html?mode=maintenance'
    };
    
    // 模块标题
    const titles = {
      welcome: '暗黑4模拟器',
      calculator: '伤害计算器 v3.0',
      simulator: '伤害计算器 v2.0',
      equipment: '装备模拟器',
      build: '构筑浏览器',
      bbs: '社区论坛',
      skills: '技能模拟器',
      paragon: '巅峰盘模拟器',
      database: '数据库',
      dataMaintenance: '数据维护'
    };
    
    // 切换侧边栏
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.querySelector('.collapse-btn');
      sidebar.classList.toggle('collapsed');
      btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    }
    
    // 选择模块
    function selectModule(moduleId) {
      // 更新菜单项状态
      document.querySelectorAll('.menu-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.module === moduleId) {
          item.classList.add('active');
        }
      });
      
      // 更新主显示区域
      const display = document.getElementById('mainDisplay');
      
      if (moduleId === 'welcome') {
        display.innerHTML = createWelcomePage();
      } else if (moduleId === 'dataMaintenance') {
        // 数据维护：先加载数据库页面，再通过postMessage切换到维护模式
        display.innerHTML = `<iframe id="maintenanceFrame" src="database/" class="function-container"></iframe>`;
        // 等待iframe加载完成后发送消息
        const frame = document.getElementById('maintenanceFrame');
        frame.onload = function() {
          try {
            frame.contentWindow.postMessage({ type: 'switchToMaintenance' }, '*');
          } catch(e) {}
        };
      } else {
        display.innerHTML = `<iframe src="${paths[moduleId]}" class="function-container"></iframe>`;
      }
    }
    
    // 创建欢迎页面
    function createWelcomePage() {
      return `
        <div class="welcome-container">
          <div class="welcome-title">⚔️ 暗黑4模拟器</div>
          <div class="welcome-subtitle">DIABLO IV SIMULATOR - S13 憎恨之躯 3.0</div>
          
          <div class="welcome-grid">
            <div class="welcome-card" onclick="selectModule('calculator')">
              <div class="welcome-icon">📐</div>
              <div class="welcome-title">伤害计算器</div>
              <div class="welcome-desc">精确计算伤害数值，支持多乘区、暴击、易伤、压制等完整机制</div>
            </div>
            <div class="welcome-card" onclick="selectModule('equipment')">
              <div class="welcome-icon">🛡️</div>
              <div class="welcome-title">装备模拟器</div>
              <div class="welcome-desc">模拟装备搭配，查看词缀效果，打造最强Build</div>
            </div>
            <div class="welcome-card" onclick="selectModule('skills')">
              <div class="welcome-icon">⚡</div>
              <div class="welcome-title">技能模拟器</div>
              <div class="welcome-desc">技能选择与组合，预览技能倍率和效果</div>
            </div>
            <div class="welcome-card" onclick="selectModule('paragon')">
              <div class="welcome-icon">⭐</div>
              <div class="welcome-title">巅峰盘模拟器</div>
              <div class="welcome-desc">巅峰节点规划，优化属性分配</div>
            </div>
            <div class="welcome-card" onclick="selectModule('database')">
              <div class="welcome-icon">📊</div>
              <div class="welcome-title">数据库</div>
              <div class="welcome-desc">浏览暗金装备、威能、词缀、技能等游戏数据</div>
            </div>
            <div class="welcome-card" onclick="selectModule('dataMaintenance')">
              <div class="welcome-icon">⚙️</div>
              <div class="welcome-title">数据维护</div>
              <div class="welcome-desc">管理和维护游戏数据，支持数据导入导出</div>
            </div>
            <div class="welcome-card" onclick="selectModule('bbs')">
              <div class="welcome-icon">💬</div>
              <div class="welcome-title">社区论坛</div>
              <div class="welcome-desc">玩家交流社区，分享攻略、组队、交易</div>
            </div>
          </div>
        </div>
      `;
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      selectModule('welcome');
    });
  </script>
</body>
</html>
