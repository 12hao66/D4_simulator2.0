<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="38" height="38">
  <defs>
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="50%" style="stop-color:#333"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="chestHigh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#555;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#333;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- 胸甲主体 -->
  <path d="M12 20 Q8 25 8 35 L8 50 L56 50 L56 35 Q56 25 52 20 L48 18 L32 14 L16 18 Z" fill="url(#chestGrad)" stroke="#333" stroke-width="1.5"/>
  
  <!-- 胸甲中央装饰 -->
  <path d="M32 18 L32 45" fill="none" stroke="#444" stroke-width="2"/>
  
  <!-- 胸甲分隔线 -->
  <path d="M32 22 L20 30" fill="none" stroke="#444" stroke-width="1"/>
  <path d="M32 22 L44 30" fill="none" stroke="#444" stroke-width="1"/>
  
  <!-- 护肩 -->
  <path d="M12 20 L6 16 L6 28 L14 32 Z" fill="url(#chestGrad)" stroke="#333" stroke-width="1"/>
  <path d="M52 20 L60 16 L60 28 L52 32 Z" fill="url(#chestGrad)" stroke="#333" stroke-width="1"/>
  
  <!-- 护甲片 -->
  <rect x="16" y="35" width="12" height="12" fill="#2a2a2a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="36" y="35" width="12" height="12" fill="#2a2a2a" stroke="#444" stroke-width="1" rx="2"/>
  
  <!-- 高光效果 -->
  <ellipse cx="24" cy="30" rx="5" ry="8" fill="url(#chestHigh)"/>
  <ellipse cx="40" cy="30" rx="5" ry="8" fill="url(#chestHigh)"/>
  
  <!-- 腰带 -->
  <rect x="10" y="48" width="44" height="4" fill="#4a3a2a" stroke="#333" stroke-width="1"/>
  
  <!-- 中央徽章 -->
  <polygon points="32,40 35,45 29,45" fill="#8b7355" stroke="#6b5344" stroke-width="0.5"/>
</svg>