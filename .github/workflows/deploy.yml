name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build calculator
        run: |
          cd modules/calculator
          npm install
          npm run build
          cd ../..

      - name: Build database
        run: |
          cd modules/database
          npm install
          npm run build
          cd ../..

      - name: Build equipment
        run: |
          cd modules/equipment
          npm install
          npm run build
          cd ../..

      - name: Build skills
        run: |
          cd modules/skills
          npm install
          npm run build
          cd ../..

      - name: Build paragon
        run: |
          cd modules/paragon
          npm install
          npm run build
          cd ../..
          
      - name: Build paragonnew
        run: |
          cd modules/paragonnew
          npm install
          npm run build
          cd ../..
          
      - name: Build build browser
        run: |
          cd modules/build
          npm install
          npm run build
          cd ../..

      - name: Build bbs
        run: |
          cd modules/bbs
          npm install
          npm run build
          cd ../..

      - name: Create dist directory
        run: mkdir -p dist

      - name: Copy modules to dist
        run: |
          cp -r modules/calculator/dist dist/calculator
          cp -r modules/database/dist dist/database
          cp -r modules/equipment/dist dist/equipment
          cp -r modules/skills/dist dist/skills
          cp -r modules/paragon/dist dist/paragon
          cp -r modules/paragonnew/dist dist/paragonnew
          cp -r modules/build/dist dist/build
          cp -r modules/bbs/dist dist/bbs
          cp -r modules/simulator dist/simulator
          cp index.html dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
