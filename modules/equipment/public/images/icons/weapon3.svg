  <circle cx="18" cy="25" r="3" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="46" cy="25" r="3" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="32" cy="39" r="3" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="20" cy="17" r="2.5" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="44" cy="17" r="2.5" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="20" cy="33" r="2.5" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="44" cy="33" r="2.5" fill="#666" stroke="#444" stroke-width="1"/>
  
  <!-- 锤头细节 -->
  <circle cx="32" cy="25" r="6" fill="#808080" stroke="#555" stroke-width="1"/>
  
