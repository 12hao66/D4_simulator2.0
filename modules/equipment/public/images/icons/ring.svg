<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="38" height="38">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="30%" style="stop-color:#c0a080"/>
      <stop offset="70%" style="stop-color:#c0a080"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <radialGradient id="ringGem" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#0088cc"/>
      <stop offset="100%" style="stop-color:#004466"/>
    </radialGradient>
  </defs>
  
  <!-- 戒指外圈 -->
  <ellipse cx="32" cy="32" rx="20" ry="14" fill="none" stroke="url(#ringGrad)" stroke-width="6"/>
  
  <!-- 戒指内圈 -->
  <ellipse cx="32" cy="32" rx="14" ry="10" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
  
  <!-- 戒指宝石座 -->
  <path d="M26 22 Q24 18 28 16 L36 16 Q40 18 38 22" fill="url(#ringGrad)" stroke="#6b5344" stroke-width="1"/>
  
  <!-- 宝石 -->
  <ellipse cx="32" cy="20" rx="5" ry="6" fill="url(#ringGem)" stroke="#ffd700" stroke-width="1"/>
  
  <!-- 宝石高光 -->
  <ellipse cx="30" cy="17" rx="2" ry="3" fill="#fff" opacity="0.4"/>
  <ellipse cx="29" cy="15" rx="1" ry="1.5" fill="#fff" opacity="0.6"/>
  
  <!-- 金属装饰 -->
  <circle cx="22" cy="32" r="3" fill="#a08060" stroke="#6b5344" stroke-width="0.5"/>
  <circle cx="42" cy="32" r="3" fill="#a08060" stroke="#6b5344" stroke-width="0.5"/>
  
  <!-- 戒指内侧阴影 -->
  <ellipse cx="32" cy="36" rx="14" ry="10" fill="none" stroke="#000" stroke-width="2" opacity="0.2"/>
  
  <!-- 装饰花纹 -->
  <path d="M24 28 L28 30" fill="none" stroke="#666" stroke-width="1"/>
  <path d="M40 28 L36 30" fill="none" stroke="#666" stroke-width="1"/>
</svg>