<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="38" height="38">
  <defs>
    <linearGradient id="bowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a3a2a"/>
      <stop offset="50%" style="stop-color:#6a5a4a"/>
      <stop offset="100%" style="stop-color:#4a3a2a"/>
    </linearGradient>
    <linearGradient id="stringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#666"/>
      <stop offset="50%" style="stop-color:#888"/>
      <stop offset="100%" style="stop-color:#666"/>
    </linearGradient>
  </defs>
  
  <!-- 弓身 -->
  <path d="M8 32 Q8 12 32 8 Q56 12 56 32 Q56 52 32 56 Q8 52 8 32" fill="none" stroke="url(#bowGrad)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 弓弦 -->
  <path d="M12 32 Q32 18 52 32" fill="none" stroke="url(#stringGrad)" stroke-width="1.5"/>
  
  <!-- 弓弦下方（放松状态） -->
  <path d="M12 32 Q32 46 52 32" fill="none" stroke="#555" stroke-width="1" opacity="0.5"/>
  
  <!-- 弓臂末端装饰 -->
  <circle cx="12" cy="32" r="4" fill="#6b5344" stroke="#4a3a2a" stroke-width="1"/>
  <circle cx="52" cy="32" r="4" fill="#6b5344" stroke="#4a3a2a" stroke-width="1"/>
  
  <!-- 握把 -->
  <rect x="28" y="48" width="8" height="6" fill="#3a2a1a" stroke="#2a1a0a" stroke-width="1" rx="1"/>
  
  <!-- 握把缠绕 -->
  <line x1="28" y1="49" x2="36" y2="49" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="28" y1="51" x2="36" y2="51" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="28" y1="53" x2="36" y2="53" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- 箭矢 -->
  <path d="M48 32 L36 32" fill="none" stroke="#8b7355" stroke-width="2"/>
  <path d="M36 32 L33 28 L36 32 L33 36 Z" fill="#6b5344" stroke="#4a3a2a" stroke-width="0.5"/>
  
  <!-- 弓身装饰 -->
  <circle cx="32" cy="20" r="2" fill="#ffd700" stroke="#cc9900" stroke-width="0.5"/>
</svg>