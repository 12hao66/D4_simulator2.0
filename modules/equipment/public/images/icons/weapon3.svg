      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#a08060"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <radialGradient id="maceHead" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#606060"/>
