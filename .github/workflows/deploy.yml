name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 彻底清空全局输出目录，删除旧打包残留
      - name: Clean global dist directory
        run: |
          rm -rf dist
          mkdir -p dist

      # 批量构建所有模块，每个模块先清自身dist再打包
      - name: Build all modules
        run: |
          set -e
          modules=(
            calculator
            database
            equipment
            skills
            paragon
            paragonnew
            build
            bbs
          )
          for mod in "${modules[@]}"; do
            echo "====================================="
            echo "Start build module: $mod"
            echo "====================================="
            cd "modules/$mod"
            # 删除模块旧产物，保证全新构建
            rm -rf dist
            npm install
            npm run build
            cd ../..
          done

      # 复制打包产物到全局dist，缺失则直接报错终止流程
      - name: Copy built resources to dist
        run: |
          set -e
          modules=(
            calculator
            database
            equipment
            skills
            paragon
            paragonnew
            build
            bbs
          )
          for mod in "${modules[@]}"; do
            src="modules/$mod/dist"
            dst="dist/$mod"
            if [ ! -d "$src" ]; then
              echo "ERROR: Module $mod build failed, dist folder missing!"
              exit 1
            fi
            cp -r "$src" "$dst"
            echo "Success copy $mod"
          done
          # 复制simulator静态目录与首页
          cp -r modules/simulator dist/simulator
          cp index.html dist/

      - name: Configure Pages environment
        uses: actions/configure-pages@v4

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
